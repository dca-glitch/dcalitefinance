services:
  postgres:
    image: postgres:16-bookworm
    container_name: dca-books-lite-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dca_books_lite
      POSTGRES_USER: dca_lite_user
      POSTGRES_PASSWORD: dca_lite_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dca_lite_user -d dca_books_lite"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dca-books-lite-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "4000:4000"

volumes:
  postgres_data:
